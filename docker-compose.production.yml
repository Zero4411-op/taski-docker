volumes:
  pg_data:
  static_volume:

services:
  db:
    image: postgres:13.10
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    image: zero44/taski_backend
    env_file: .env
    volumes:
      - static_volume:/backend_static
    depends_on:
      - db

  frontend:
    image: zero44/taski_frontend
    env_file: .env
    volumes:
      - static_volume:/frontend_static
    command: sh -c "npm run build && cp -r /app/build/. /frontend_static/"

  gateway:
    image: nginx:1.22.1
    env_file: .env
    volumes:
      - static_volume:/staticfiles
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8000:80"
    depends_on:
      - backend
